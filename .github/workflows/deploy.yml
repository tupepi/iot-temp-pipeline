name: Deploy frontend
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'   # Ajetaan vain jos frontend-kansio muuttuu
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Deploy
        run: npx gh-pages -d dist -r https://x-access-token:${GITHUB_TOKEN}@github.com/tupepi/iot-temp-pipeline.git
        working-directory: frontend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}